<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Monoton&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="top">
        <h1>
          Generate a<br />
          <span class="bold-text">random password</span>
        </h1>
        <p>Never use an insecure password again.</p>
        <div class="slideContainer">
          <div class="range">
            <p>Choose a password length</p>
            <input
              type="range"
              min="8"
              max="20"
              value="14"
              class="slider"
              id="slider"
            />
          </div>
          <span class="rangeReading" id="rangeReading"></span>
        </div>
        <button class="generate-btn" id="generate-btn">
          Generate password
        </button>
      </div>
      <div class="bottom">
        <div class="password">
          <div class="passwordA" id="password1"></div>
          <button id="btnPasswordA" onclick="copyText('password1', this)">
            Copy Password
          </button>
        </div>
        <div class="password">
          <div class="passwordB" id="password2"></div>
          <button id="btnPasswordB" onclick="copyText('password2', this)">
            Copy Password
          </button>
        </div>
      </div>
    </div>
    <footer>Made by Manel ʕ´•ᴥ•`ʔ &copy; 2026</footer>
    <script src="script.js"></script>
  </body>
</html>
